name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  OPENAI_API_KEY: test_key_for_ci
  OPENAI_MODEL: gpt-4o-mini
  AI_PROVIDER: openai
  GEMINI_API_KEY: test_gemini_key
  SUPABASE_URL: https://test.supabase.co
  SUPABASE_KEY: test_supabase_key

jobs:
  backend:
    name: Backend Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc make libsqlite3-dev libcurl4-openssl-dev

      - name: Build Backend
        working-directory: backend
        run: make all

      - name: Run Backend Tests
        working-directory: backend
        run: make test

      - name: Run Coverage
        working-directory: backend
        run: |
          make clean
          make CFLAGS="-Wall -Wextra -Wpedantic -std=c11 -D_POSIX_C_SOURCE=200809L -D_DEFAULT_SOURCE -I./include -I./third_party --coverage" LDFLAGS="-lsqlite3 -lcurl -lm --coverage" test || true
          if command -v gcov &> /dev/null; then
            gcov tests/*.c services/*.c database/*.c utils/*.c 2>/dev/null || true
          fi

      - name: Upload Backend Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: |
            backend/*.gcov
            backend/*.gcno
            backend/*.gcda
          retention-days: 7

  frontend:
    name: Frontend Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint || true

      - name: Run Tests
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080
          NEXT_PUBLIC_SUPABASE_URL: https://test.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: test_key
        run: npm test

      - name: Build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080
          NEXT_PUBLIC_SUPABASE_URL: https://test.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: test_key
        run: npm run build

      - name: Upload Coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 7

  docker:
    name: Docker Build Verification
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Build Backend Image
        run: docker build -t hyk-backend ./backend

      - name: Build Frontend Image
        run: docker build -t hyk-frontend ./frontend
