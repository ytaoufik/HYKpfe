name: CI

on:
	push:
		branches: ["main", "develop"]
	pull_request:
		branches: ["main", "develop"]

jobs:
	backend:
		runs-on: ubuntu-latest
		defaults:
			run:
				working-directory: backend
		steps:
			- name: Checkout
				uses: actions/checkout@v4

			- name: Install dependencies
				run: |
					sudo apt-get update
					sudo apt-get install -y libsqlite3-dev libcurl4-openssl-dev

			- name: Build
				run: make all

			- name: Run tests
				run: make test

	frontend:
		runs-on: ubuntu-latest
		defaults:
			run:
				working-directory: frontend
		steps:
			- name: Checkout
				uses: actions/checkout@v4

			- name: Setup Node
				uses: actions/setup-node@v4
				with:
					node-version: 20
					cache: npm
					cache-dependency-path: frontend/package.json

			- name: Install
				run: npm install

			- name: Lint
				run: npm run lint

			- name: Test
				run: npm test

			- name: Build
				run: npm run build
